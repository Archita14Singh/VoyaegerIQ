name: Deploy VoyagerIQ to Azure Container Apps

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry (ACR)
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/voyageriq:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/voyageriq:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/voyageriq:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/voyageriq:latest

      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ secrets.ACR_NAME }}
          containerAppName: ${{ secrets.ACA_APP_NAME }}
          resourceGroup: ${{ secrets.ACA_RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/voyageriq:${{ github.sha }}
